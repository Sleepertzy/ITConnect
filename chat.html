<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="chat-page">

  <div class="chat-sidebar">
    <h2>💬 Chat</h2>

    <div class="user">User A</div>
    <div class="user">User B</div>
  </div>

  <div class="chat-content">

    <div class="messages">
      <div class="message">
        Halo, saya tertarik dengan project...
      </div>
    </div>

    <div class="chat-input">
      <input type="text" placeholder="Ketik pesan...">
      <button>Send</button>
    </div>

  </div>

</div>

</body>
</html>
