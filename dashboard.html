<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ITConnect — Dashboard</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.rec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:28px; }
.proj-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r2); padding:20px;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:all .2s; cursor:pointer;
}
.proj-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,0.3); }
.proj-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.proj-cat { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--cyan); }
.proj-hot { font-size:0.75rem; background:rgba(255,100,0,0.12); color:#ff7043; padding:2px 8px; border-radius:6px; font-weight:600; }
.proj-title { font-size:0.98rem; font-weight:700; margin-bottom:8px; line-height:1.3; }
.proj-client { font-size:0.8rem; color:var(--text2); margin-bottom:12px; }
.proj-budget { font-size:1.1rem; font-weight:800; color:var(--cyan); font-family:var(--mono); margin-bottom:12px; }
.proj-skills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.proj-skill { padding:3px 8px; border-radius:6px; font-size:0.74rem; background:var(--surface2); border:1px solid var(--border); color:var(--text2); }

.two-col { display:grid; grid-template-columns:1fr 340px; gap:20px; }
.progress-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--r2); padding:22px; }
.progress-title { font-size:0.95rem; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:6px; }

.stat-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
.stat-row:last-child { border-bottom:none; }
.stat-row-label { font-size:0.85rem; color:var(--text2); }
.stat-row-val { font-size:1.1rem; font-weight:800; font-family:var(--mono); }

.quick-actions { display:flex; flex-direction:column; gap:10px; }
.quick-action {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; border-radius:12px;
  background:var(--bg2); border:1px solid var(--border);
  cursor:pointer; transition:all .15s; text-decoration:none; color:var(--text);
}
.quick-action:hover { background:var(--surface); border-color:var(--border2); }
.qa-icon { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.qa-title { font-size:0.88rem; font-weight:700; }
.qa-sub   { font-size:0.76rem; color:var(--text2); }

@media(max-width:992px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
